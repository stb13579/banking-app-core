name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from app.main import app; print('OK')"
        env:
          DATABASE_URL: postgresql://banking:banking@localhost:5432/banking
          JWT_SECRET: test-secret

      - name: Build Docker image
        run: docker build -t banking-app-core:ci .
